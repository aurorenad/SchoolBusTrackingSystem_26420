spring.application.name=transportManagementSystem
server.port=8081

spring.datasource.url=jdbc:postgresql://localhost:5432/school_bus_management_db
spring.datasource.username=postgres
spring.datasource.password=12345

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql: true

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.datasource.hikari.auto-commit=false

# Return useful error messages to frontend (dev-friendly)
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-exception=false
server.error.include-stacktrace=never

# Email (OTP delivery)
# Set these as environment variables (recommended) so you don't commit credentials.
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.default-encoding=UTF-8

# Frontend URL for email links (used in OTP emails)
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# Debugging (remove/turn down in production)
spring.security.debug=true
logging.level.org.springframework.security=TRACE

# Ensure email service logs are visible
logging.level.auca.ac.rw.transportManagementSystem.service.EmailService=INFO